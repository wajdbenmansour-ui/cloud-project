name: CI-CD Pipeline

on:
  push:
    branches: [main]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: echo "Tests passed"

    - name: Build Docker image
      run: docker build -t student-api .
